# ==============================================================
# compose.yaml — Laravel + .NET API + MySQL
# Dev Template: Clone แล้วรัน docker compose up --build ได้เลย!
#
# วิธีใช้:
#   1. git clone <repo-url>
#   2. docker compose up --build
#   3. เปิด http://localhost:8000 (Laravel)
#   4. เปิด http://localhost:5000 (.NET API)
#
# Version ที่ล็อคไว้ (ตรงกับ Server):
#   - PHP:    8.1
#   - MySQL:  8.4
#   - .NET:   10.0
#   - Laravel: 10.x (ติดตั้งอัตโนมัติ)
# ==============================================================

services:
  # ─────────────────────────────────────────────
  # Laravel PHP Application
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    volumes:
      - './src:/var/www'               # Mount โค้ด Laravel (สร้างให้อัตโนมัติถ้ายังไม่มี)
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # Nginx Web Server
  # ─────────────────────────────────────────────
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '8000:80'                      # http://localhost:8000
    volumes:
      - './src:/var/www'               # Share โค้ดกับ app container
      - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf'
    depends_on:
      - app
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────────
  db:
    image: 'mysql:8.4'
    restart: unless-stopped
    ports:
      - '3306:3306'                    # เข้าถึง DB ผ่าน localhost:3306
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
    volumes:
      - 'db-data:/var/lib/mysql'       # เก็บข้อมูล DB ถาวร
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # .NET API Service
  # ─────────────────────────────────────────────
  api_dotnet:
    build:
      context: ./Api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '5000:8080'                    # http://localhost:5000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
    driver: local
