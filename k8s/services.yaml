apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: hospital-prod
spec:
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: hospital-prod
spec:
  selector:
    app: laravel
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: hospital-prod
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: api-dotnet
  namespace: hospital-prod
spec:
  type: NodePort
  selector:
    app: api-dotnet
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30050
