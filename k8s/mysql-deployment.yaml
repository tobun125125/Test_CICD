apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: hospital-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.4
        imagePullPolicy: IfNotPresent
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "password" # Hardcoded for demo, normally from secret
        - name: MYSQL_DATABASE
          value: "laravel"
        - name: MYSQL_USER
          value: "sail"
        - name: MYSQL_PASSWORD
          value: "password"
        - name: MYSQL_ALLOW_EMPTY_PASSWORD
          value: "1"
        ports:
        - containerPort: 3306
