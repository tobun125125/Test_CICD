apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: hospital-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: laravel
  template:
    metadata:
      labels:
        app: laravel
    spec:
      containers:
      - name: app
        image: prod-app:latest
        imagePullPolicy: Never # Use local image built by Jenkins
        env:
        - name: DB_CONNECTION
          value: mysql
        - name: DB_HOST
          value: db
        - name: DB_PORT
          value: "3306"
        - name: DB_DATABASE
          value: "laravel"
        - name: DB_USERNAME
          value: "sail"
        - name: DB_PASSWORD
          value: "password"
        ports:
        - containerPort: 9000
