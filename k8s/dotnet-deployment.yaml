apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-dotnet
  namespace: hospital-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-dotnet
  template:
    metadata:
      labels:
        app: api-dotnet
    spec:
      containers:
      - name: api-dotnet
        image: prod-api_dotnet:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
